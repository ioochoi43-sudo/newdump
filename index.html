<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="마인드덤프">
<meta name="theme-color" content="#FAFAF9">
<title>마인드 덤프</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ────────── TOKENS ────────── */
:root{
  --bg:#FAFAF9; --white:#fff; --ink:#18171A; --ink2:#52505A; --ink3:#9E9AA6;
  --line:#ECEAEF; --line2:#F4F3F6;
  --pink:#E07FA0; --pink-s:#FDF0F4; --pink-m:#F4BECE;
  --green:#6BA888; --green-s:#EDF6F1; --green-m:#AEDBC6;
  --blue:#6D91C4;  --blue-s:#EEF3FB;  --blue-m:#B3CAE8;
  --red:#D94F4F;
  --sh0:0 1px 3px rgba(0,0,0,.06);
  --sh1:0 2px 12px rgba(0,0,0,.08);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --sh3:0 16px 56px rgba(0,0,0,.16);
  --r:12px; --rs:8px; --safe:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ────────── LAYOUT ────────── */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
.main{flex:1;padding:32px 28px 80px;min-width:0;max-width:760px;}

/* ────────── SIDEBAR ────────── */
.brand{padding:22px 20px 18px;border-bottom:1px solid var(--line);}
.brand-eyebrow{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-.03em;line-height:1.15;}
.brand-name em{color:var(--pink);font-style:normal;}
.nav{padding:10px 0;flex:1;}
.nav-label{padding:8px 18px 3px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);}
.ni{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink2);transition:all .12s;border-left:2.5px solid transparent;border-radius:0;}
.ni:hover{background:var(--bg);color:var(--ink);}
.ni.active{border-left-color:var(--pink);background:var(--pink-s);color:var(--ink);}
.ni-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ni-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--line);padding:1px 7px;border-radius:20px;color:var(--ink2);}
.ni.active .ni-badge{background:var(--pink);color:#fff;}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 18px;font-size:12px;font-weight:500;color:var(--ink2);}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--line);}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:5px;font-weight:500;}
.progress-bar{height:3px;background:var(--line);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--pink));border-radius:3px;transition:width .4s ease;}

/* ────────── BUTTONS ────────── */
.btn{font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:30px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:-.01em;}
.btn-primary{background:var(--ink);color:#fff;}.btn-primary:hover{background:#2d2b32;}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink2);}.btn-ghost:hover{border-color:var(--ink3);}
.btn-sm{padding:5px 12px;font-size:11px;}

/* ────────── SECTION LABEL ────────── */
.sec-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}

/* ────────── DUMP BOX ────────── */
.dump-box{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh0);margin-bottom:22px;}
.dump-head{padding:11px 16px 10px;border-bottom:1px solid var(--line);background:var(--pink-s);display:flex;align-items:center;gap:8px;}
.dump-head-lbl{font-size:12px;font-weight:700;color:var(--ink2);flex:1;}
.dump-ta{width:100%;min-height:100px;border:none;outline:none;background:transparent;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--ink);line-height:1.8;resize:none;padding:14px 16px;caret-color:var(--pink);}
.dump-ta::placeholder{color:var(--ink3);}
.dump-foot{display:flex;align-items:center;gap:7px;padding:9px 14px;border-top:1px solid var(--line);}
.dump-hint{font-size:11px;color:var(--ink3);flex:1;}

/* ────────── SORT BAR ────────── */
.sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.sort-lbl{font-size:11px;color:var(--ink3);font-weight:500;}
.sort-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1.5px solid var(--line);background:transparent;cursor:pointer;color:var(--ink3);transition:all .12s;}
.sort-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ────────── UNSORTED ────────── */
.u-wrap{margin-bottom:22px;}
.u-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.u-list{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh0);}
.u-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);animation:fadeUp .2s ease;flex-wrap:wrap;}
.u-row:last-child{border-bottom:none;}
.u-txt{flex:1;font-size:14px;min-width:120px;outline:none;border-bottom:1.5px solid transparent;transition:border-color .15s;line-height:1.5;caret-color:var(--pink);}
.u-txt:focus{border-bottom-color:var(--line);}
.u-cat-btns{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}
.u-cat-btn{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid currentColor;cursor:pointer;background:transparent;transition:all .12s;}

/* ────────── GROUP ────────── */
.group{display:none;margin-bottom:22px;}
.group.show{display:block;}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.group-dot{width:8px;height:8px;border-radius:50%;}
.group-name{font-size:13px;font-weight:700;}
.group-count{font-size:11px;color:var(--ink3);margin-left:auto;font-weight:500;}
.group-list{background:var(--white);border-radius:var(--r);box-shadow:var(--sh0);overflow:visible;}

/* ────────── TASK ITEM ────────── */
.t-item{border-bottom:1px solid var(--line);position:relative;animation:fadeUp .2s ease;}
.t-item:last-child{border-bottom:none;}
.t-item.dragging{opacity:.3;}
.t-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;}
.t-main{display:flex;align-items:flex-start;gap:8px;padding:11px 12px 11px 17px;transition:background .1s;}
.t-main:hover{background:rgba(0,0,0,.012);}
.t-drag{cursor:grab;color:var(--line);font-size:12px;flex-shrink:0;margin-top:2px;user-select:none;line-height:1;transition:color .12s;}
.t-drag:hover{color:var(--ink3);}
.t-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.t-chk svg{display:none;}
.t-item.done .t-chk svg{display:block;}
.t-body{flex:1;min-width:0;}
.t-text{font-size:14px;font-weight:400;line-height:1.6;word-break:break-word;outline:none;display:block;width:100%;border-bottom:1.5px solid transparent;transition:border-color .15s;caret-color:var(--pink);}
.t-text:focus{border-bottom-color:var(--line);}
.t-item.done .t-text{text-decoration:line-through;opacity:.4;}
.t-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
/* date pill */
.t-date-pill{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;padding:2px 0;color:var(--ink3);transition:color .12s;background:none;border:none;}
.t-date-pill:hover{color:var(--ink2);}
.t-date-pill .t-date-val{font-size:10px;color:var(--ink3);}
/* d-day badge */
.t-dday{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.dday-past{background:#FFE4E8;color:#D94F4F;}
.dday-0{background:var(--pink);color:#fff;}
.dday-soon{background:var(--pink-s);color:var(--pink);}
.dday-ok{background:var(--green-s);color:var(--green);}
.dday-far{background:var(--blue-s);color:var(--blue);}
/* category tag */
.t-cat-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;}
/* time move */
.t-move-btns{display:flex;gap:3px;flex-wrap:wrap;}
.t-move-btn{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1.5px solid currentColor;background:transparent;cursor:pointer;opacity:.6;transition:all .12s;}
.t-move-btn:hover{opacity:1;}
/* kanban toggle */
.t-kb-btn{font-size:11px;font-weight:600;color:var(--ink3);background:none;border:none;cursor:pointer;padding:0;transition:color .12s;display:flex;align-items:center;gap:3px;}
.t-kb-btn:hover{color:var(--ink2);}
/* copy */
.t-copy-btn{font-size:10px;font-weight:500;background:none;border:1px solid var(--line);color:var(--ink3);border-radius:20px;padding:2px 8px;cursor:pointer;transition:all .12s;}
.t-copy-btn:hover{border-color:var(--ink2);color:var(--ink2);}
/* right actions */
.t-acts{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-top:1px;}
.t-act{background:none;border:none;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:13px;color:var(--ink3);transition:all .12s;}
.t-act:hover{background:var(--line2);color:var(--ink2);}
.t-act.del:hover{color:var(--red);}
.t-color-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,.12);cursor:pointer;flex-shrink:0;transition:transform .12s;}
.t-color-dot:hover{transform:scale(1.25);}

/* ────────── POPUPS ────────── */
.popup{position:absolute;right:10px;top:40px;background:var(--white);border:1.5px solid var(--line);border-radius:var(--rs);z-index:200;box-shadow:var(--sh2);display:none;}
.popup.open{display:block;animation:fadeUp .14s ease;}
/* color picker */
.cp-box{padding:12px 14px;width:188px;}
.cp-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.cp-swatches{display:grid;grid-template-columns:repeat(6,22px);gap:5px;margin-bottom:9px;}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .12s;display:flex;align-items:center;justify-content:center;}
.swatch:hover{transform:scale(1.15);}
.swatch.active{border-color:var(--ink);}
.cp-custom{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink3);}
.cp-custom input[type=color]{width:32px;height:20px;border:1.5px solid var(--line);border-radius:4px;cursor:pointer;padding:1px;}
/* date picker */
.dp-box{padding:14px 16px;width:220px;}
.dp-row{margin-bottom:10px;}
.dp-lbl{font-size:11px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.dp-lbl input[type=checkbox]{accent-color:var(--pink);cursor:pointer;}
.dp-input{width:100%;font-family:'Pretendard',sans-serif;font-size:12px;border:1.5px solid var(--line);border-radius:7px;padding:7px 10px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .12s;}
.dp-input:focus{border-color:var(--pink-m);}
.dp-input:disabled{opacity:.3;cursor:not-allowed;}
.dp-acts{display:flex;gap:6px;margin-top:2px;}
.dp-acts .btn{flex:1;padding:7px;border-radius:8px;font-size:11px;}
/* cat picker */
.cat-pick-box{padding:10px 12px;width:158px;}
.cat-pick-row{display:flex;align-items:center;gap:7px;padding:6px 4px;cursor:pointer;border-radius:6px;transition:background .1s;font-size:12px;font-weight:500;color:var(--ink2);}
.cat-pick-row:hover{background:var(--line2);}
.cat-pick-row.active{background:var(--line2);}
.cat-pick-empty{font-size:11px;color:var(--ink3);padding:4px 0;}
.cat-pick-clear{font-size:11px;color:var(--ink3);padding:7px 4px 3px;cursor:pointer;border-top:1px solid var(--line);margin-top:4px;transition:color .12s;}
.cat-pick-clear:hover{color:var(--red);}

/* ────────── KANBAN MODAL ────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(18,16,22,.44);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.open{display:flex;animation:fadeIn .15s ease;}
@media(min-width:580px){.modal-overlay{align-items:center;padding:20px;}}
.modal-sheet{background:var(--white);border-radius:14px 14px 0 0;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3);animation:slideUp .22s ease;display:flex;flex-direction:column;}
@media(min-width:580px){.modal-sheet{border-radius:14px;max-width:520px;}}
.modal-drag-bar{width:36px;height:4px;background:var(--line);border-radius:2px;margin:10px auto 0;}
@media(min-width:580px){.modal-drag-bar{display:none;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 11px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--white);z-index:1;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.02em;line-height:1.3;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:22px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .12s;}
.modal-close:hover{background:var(--bg);color:var(--ink);}
.modal-meta{font-size:11px;color:var(--ink3);padding:8px 18px 0;}
.modal-body{padding:14px 18px 24px;}
/* kanban board */
.kb-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:480px;}
.kb-col{background:var(--bg);border-radius:var(--rs);overflow:visible;}
.kb-col.kb-over{box-shadow:0 0 0 2px var(--pink-m);}
.kb-col-head{padding:9px 10px 7px;border-radius:var(--rs) var(--rs) 0 0;display:flex;align-items:center;gap:6px;}
.kb-col-name{font-size:12px;font-weight:700;}
.kb-col-cnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:auto;}
.kb-col-body{padding:4px 6px;min-height:20px;}
.kb-card{background:var(--white);border:1px solid var(--line);border-radius:7px;padding:8px 8px 7px;margin-bottom:5px;cursor:grab;transition:box-shadow .1s;position:relative;animation:fadeUp .15s ease;}
.kb-card:hover{box-shadow:var(--sh0);}
.kb-card.dragging{opacity:.3;}
.kb-card:last-child{margin-bottom:0;}
.kb-card-top{display:flex;align-items:flex-start;gap:6px;}
.kb-memo{width:100%;font-family:'Pretendard',sans-serif;font-size:11px;color:var(--ink2);border:none;border-top:1px solid var(--line2);background:transparent;outline:none;resize:none;padding:5px 8px;line-height:1.5;caret-color:var(--pink);min-height:0;overflow:hidden;display:block;}
.kb-memo::placeholder{color:var(--ink3);}
.kb-memo:focus{background:var(--line2);}
.kb-card.done .kb-memo{opacity:.45;}
.mx-memo-preview{font-size:10px;color:var(--ink3);line-height:1.4;margin-top:2px;white-space:pre-wrap;word-break:break-word;}
.kb-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--line);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;margin-top:2px;}
.kb-card:hover .kb-chk{border-color:var(--ink3);}
.kb-card.done .kb-chk{background:var(--green);border-color:var(--green);}
.kb-chk svg{display:none;}
.kb-card.done .kb-chk svg{display:block;}
.kb-card-txt{flex:1;font-size:12px;font-weight:400;outline:none;border-bottom:1px solid transparent;line-height:1.5;caret-color:var(--pink);color:var(--ink);}
.kb-card-txt:focus{border-bottom-color:var(--line);}
.kb-card.done .kb-card-txt{text-decoration:line-through;opacity:.45;}
.kb-card-acts{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.kb-card-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;}
.kb-card-date{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;}
.kb-mv-pop{position:absolute;right:0;top:100%;background:var(--white);border:1.5px solid var(--line);border-radius:var(--rs);padding:9px 11px;z-index:300;box-shadow:var(--sh2);display:none;min-width:120px;margin-top:2px;}
.kb-mv-pop.open{display:block;animation:fadeUp .14s ease;}
.kb-mv-title{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.kb-mv-btn{display:flex;align-items:center;gap:6px;padding:6px 5px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:background .1s;border:none;background:transparent;width:100%;text-align:left;}
.kb-mv-btn:hover{background:var(--line2);}
.kb-dp-pop{position:absolute;right:0;top:100%;background:var(--white);border:1.5px solid var(--line);border-radius:var(--rs);padding:11px 13px;z-index:300;box-shadow:var(--sh2);display:none;width:188px;margin-top:2px;}
.kb-dp-pop.open{display:block;animation:fadeUp .14s ease;}
.kb-dp-pop input{width:100%;font-family:'Pretendard',sans-serif;font-size:12px;border:1.5px solid var(--line);border-radius:7px;padding:6px 9px;background:var(--bg);color:var(--ink);outline:none;margin-bottom:8px;}
.kb-dp-pop input:focus{border-color:var(--pink-m);}
.kb-dp-acts{display:flex;gap:5px;}
.kb-dp-acts .btn{flex:1;padding:6px;font-size:11px;border-radius:7px;}
.kb-add-row{padding:4px 6px 7px;display:flex;align-items:center;gap:4px;}
.kb-add-inp{flex:1;font-family:'Pretendard',sans-serif;font-size:11px;border:none;border-bottom:1.5px solid var(--line);background:transparent;outline:none;padding:3px 0;caret-color:var(--pink);}
.kb-add-inp:focus{border-bottom-color:var(--pink-m);}
.kb-add-btn{background:none;border:1px solid var(--line);border-radius:5px;cursor:pointer;color:var(--ink3);font-size:13px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.kb-add-btn:hover{background:var(--line2);}
@media(max-width:420px){.kb-board{grid-template-columns:1fr;}}

/* ────────── TIMELINE ────────── */
.tl-wrap{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);box-shadow:var(--sh1);overflow:hidden;}
.tl-head{display:flex;align-items:center;gap:8px;padding:13px 16px 10px;border-bottom:1px solid var(--line);}
.tl-title{font-size:15px;font-weight:800;letter-spacing:-.02em;flex:1;}
.tl-nav{background:none;border:1.5px solid var(--line);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .12s;}
.tl-nav:hover{background:var(--bg);}
.tl-today-btn{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;border:1.5px solid var(--line);background:transparent;cursor:pointer;color:var(--ink2);transition:all .12s;}
.tl-today-btn:hover{background:var(--bg);}
.tl-grid{width:100%;}
.tl-days{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line);padding:0 10px;}
.tl-day{text-align:center;padding:7px 2px 5px;}
.tl-day-name{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);}
.tl-day-num{font-size:13px;font-weight:700;color:var(--ink2);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0;}
.tl-day.today .tl-day-num{background:var(--pink);color:#fff;}
.tl-day.today .tl-day-name{color:var(--pink);}
.tl-day.weekend .tl-day-name,.tl-day.weekend .tl-day-num{color:var(--pink);}
.tl-rows-wrap{padding:8px 10px 14px;position:relative;}
.tl-bar{position:absolute;height:24px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .12s;}
.tl-bar:hover{filter:brightness(.9);}
.tl-bar.bar-s{border-radius:5px 0 0 5px;}
.tl-bar.bar-m{border-radius:0;}
.tl-bar.bar-e{border-radius:0 5px 5px 0;}
.tl-empty{font-size:12px;color:var(--ink3);text-align:center;padding:24px 0;}
.tl-today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--pink);opacity:.3;pointer-events:none;}
.tl-tooltip{position:fixed;background:rgba(18,16,22,.9);color:#fff;font-size:11px;font-weight:500;padding:6px 12px;border-radius:8px;pointer-events:none;z-index:600;white-space:nowrap;opacity:0;transition:opacity .12s;}
.tl-tooltip.show{opacity:1;}

/* ────────── MATRIX VIEW ────────── */
.mx-wrap{}
.mx-filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.mx-filter-chip{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;transition:all .12s;border:1.5px solid transparent;}
.mx-filter-chip.dim{opacity:.4;}
.mx-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:start;}
.mx-col{background:var(--white);border-radius:var(--r);border:1.5px solid var(--line);overflow:hidden;box-shadow:var(--sh0);transition:border-color .12s,box-shadow .12s;}
.mx-col.over{border-color:var(--pink-m);box-shadow:0 0 0 3px var(--pink-s);}
.mx-col-head{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 8px;border-bottom:1px solid var(--line);}
.mx-col-name{font-size:12px;font-weight:700;}
.mx-col-cnt{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;}
.mx-col-body{padding:7px;min-height:80px;}
.mx-empty-col{font-size:11px;color:var(--ink3);text-align:center;padding:18px 0;}
.mx-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--rs);margin-bottom:6px;overflow:visible;cursor:grab;transition:box-shadow .1s;position:relative;animation:fadeUp .15s ease;}
.mx-card:last-child{margin-bottom:0;}
.mx-card:hover{box-shadow:var(--sh0);}
.mx-card.dragging{opacity:.3;}
.mx-parent-strip{display:flex;align-items:center;gap:5px;padding:5px 9px 4px;background:var(--white);border-bottom:1px solid var(--line2);border-radius:var(--rs) var(--rs) 0 0;}
.mx-parent-name{font-size:10px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mx-parent-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.mx-card-body{display:flex;align-items:flex-start;gap:5px;padding:6px 8px 7px;}
.mx-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--line);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;margin-top:2px;}
.mx-card:hover .mx-chk{border-color:var(--ink3);}
.mx-card.done .mx-chk{background:var(--green);border-color:var(--green);}
.mx-chk svg{display:none;}
.mx-card.done .mx-chk svg{display:block;}
.mx-card-right{flex:1;min-width:0;}
.mx-txt{font-size:12px;font-weight:400;outline:none;border-bottom:1px solid transparent;line-height:1.5;color:var(--ink);display:block;width:100%;caret-color:var(--pink);}
.mx-txt:focus{border-bottom-color:var(--line);}
.mx-card.done .mx-txt{text-decoration:line-through;opacity:.45;}
.mx-card-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.mx-cal-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:0;display:flex;align-items:center;gap:2px;color:var(--ink3);}
.mx-cal-btn:hover{color:var(--ink2);}
.mx-date-txt{font-size:9px;color:var(--ink3);}
.mx-mv-btn{background:none;border:1px solid var(--line);border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;padding:1px 6px;color:var(--ink3);transition:all .12s;}
.mx-mv-btn:hover{background:var(--line2);color:var(--ink2);}
.mx-card-acts{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.mx-mini-pop{position:absolute;right:0;top:100%;background:var(--white);border:1.5px solid var(--line);border-radius:var(--rs);padding:10px 12px;z-index:300;box-shadow:var(--sh2);display:none;min-width:130px;margin-top:2px;}
.mx-mini-pop.open{display:block;animation:fadeUp .14s ease;}
.mx-mini-title{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.mx-mini-btn{display:flex;align-items:center;gap:6px;padding:6px 4px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:background .1s;border:none;background:transparent;width:100%;text-align:left;}
.mx-mini-btn:hover{background:var(--line2);}
.mx-dp-pop{position:absolute;right:0;top:100%;background:var(--white);border:1.5px solid var(--line);border-radius:var(--rs);padding:11px 13px;z-index:300;box-shadow:var(--sh2);display:none;width:186px;margin-top:2px;}
.mx-dp-pop.open{display:block;animation:fadeUp .14s ease;}
.mx-dp-pop input{width:100%;font-family:'Pretendard',sans-serif;font-size:12px;border:1.5px solid var(--line);border-radius:7px;padding:6px 9px;background:var(--bg);color:var(--ink);outline:none;margin-bottom:7px;}
.mx-dp-pop input:focus{border-color:var(--pink-m);}
.mx-dp-acts{display:flex;gap:5px;}
.mx-dp-acts .btn{flex:1;padding:6px;font-size:11px;border-radius:7px;}
.mx-summary{font-size:11px;color:var(--ink3);margin-bottom:12px;}
.mx-empty-state{text-align:center;padding:48px 20px;color:var(--ink3);font-size:13px;}
@media(max-width:500px){.mx-board{grid-template-columns:1fr;}}

/* ────────── COPY VIEW ────────── */
.copy-box{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh0);margin-bottom:16px;}
.copy-box-head{padding:10px 15px;border-bottom:1px solid var(--line);background:var(--green-s);font-size:12px;font-weight:700;color:var(--ink2);}
.copy-btns{display:flex;gap:6px;flex-wrap:wrap;padding:11px 15px;}
.copy-btn{font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;padding:7px 14px;border-radius:30px;border:1.5px solid var(--line);background:transparent;cursor:pointer;color:var(--ink2);transition:all .12s;}
.copy-btn:hover{background:var(--bg);border-color:var(--ink3);}
.copy-preview{background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);padding:14px;font-size:11px;line-height:1.8;white-space:pre-wrap;color:var(--ink2);min-height:80px;}

/* ────────── CAT MODAL ────────── */
.cat-modal-sheet{background:var(--white);border-radius:14px 14px 0 0;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--sh3);animation:slideUp .2s ease;}
@media(min-width:580px){.cat-modal-sheet{border-radius:14px;max-width:380px;}}
.cat-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--line);}
.cat-modal-body{padding:14px 18px 20px;}
.cat-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line2);}
.cat-row:last-child{border-bottom:none;}
.cat-color-inp{width:28px;height:28px;border:2px solid var(--line);border-radius:50%;cursor:pointer;padding:1px;flex-shrink:0;}
.cat-name-inp{flex:1;font-family:'Pretendard',sans-serif;font-size:13px;border:none;border-bottom:1.5px solid var(--line);outline:none;padding:3px 0;background:transparent;color:var(--ink);}
.cat-name-inp:focus{border-bottom-color:var(--pink-m);}
.cat-del-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:15px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .12s;}
.cat-del-btn:hover{color:var(--red);background:var(--line2);}

/* ────────── CONFIRM DIALOG ────────── */
.confirm-overlay{position:fixed;inset:0;background:rgba(18,16,22,.5);z-index:800;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;animation:fadeIn .15s ease;}
.confirm-box{background:#fff;border-radius:14px;padding:24px 22px;max-width:310px;width:100%;box-shadow:var(--sh3);animation:slideUp .18s ease;}
.confirm-msg{font-size:15px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:20px;text-align:center;}
.confirm-acts{display:flex;gap:10px;}
.confirm-acts .btn{flex:1;padding:12px;border-radius:10px;font-size:14px;}

/* ────────── TOAST ────────── */
.toast{position:fixed;bottom:calc(22px + var(--safe));left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:9px 20px;border-radius:30px;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ────────── MOBILE ────────── */
@media(max-width:660px){
  .sidebar{display:none;}
  .main{padding:16px 13px calc(64px + var(--safe));}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);padding:7px 4px calc(6px + var(--safe));z-index:400;}
  .mn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em;transition:color .12s;}
  .mn.active{color:var(--pink);}
  .mn-icon{font-size:18px;line-height:1;}
}
@media(min-width:661px){.mobile-nav{display:none;}}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <p class="brand-eyebrow">Mind Dump</p>
    <h1 class="brand-name">머릿속을<br><em>비워요 ✦</em></h1>
  </div>
  <nav class="nav">
    <div class="nav-label">시간 기반</div>
    <div class="ni active" data-v="dump" onclick="sw('dump',this)"><span class="ni-dot" style="background:var(--pink)"></span>덤프 &amp; 분류<span class="ni-badge" id="nb-u">0</span></div>
    <div class="ni" data-v="today" onclick="sw('today',this)"><span class="ni-dot" style="background:var(--pink)"></span>오늘<span class="ni-badge" id="nb-t">0</span></div>
    <div class="ni" data-v="week" onclick="sw('week',this)"><span class="ni-dot" style="background:var(--green)"></span>이번 주<span class="ni-badge" id="nb-w">0</span></div>
    <div class="ni" data-v="later" onclick="sw('later',this)"><span class="ni-dot" style="background:var(--blue)"></span>나중에<span class="ni-badge" id="nb-l">0</span></div>
    <div class="ni" data-v="timeline" onclick="sw('timeline',this)"><span class="ni-dot" style="background:var(--ink3)"></span>타임라인</div>
    <div class="ni" data-v="matrix" onclick="sw('matrix',this)"><span class="ni-dot" style="background:var(--ink3)"></span>세부 모아보기<span class="ni-badge" id="nb-m">0</span></div>
    <div class="ni" data-v="copy" onclick="sw('copy',this)"><span class="ni-dot" style="background:var(--ink3)"></span>내보내기</div>
    <div style="height:6px"></div>
    <div class="nav-label">카테고리 <button onclick="openCatModal()" style="background:none;border:none;cursor:pointer;color:var(--pink);font-size:11px;font-weight:700;margin-left:3px">+ 관리</button></div>
    <div id="cat-nav-list"></div>
  </nav>
  <div class="sidebar-foot">
    <div class="progress-label"><span>완료율</span><strong id="prog-pct">0%</strong></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- DUMP VIEW -->
  <div id="v-dump">
    <p class="sec-label">생각 덤프</p>
    <div class="dump-box">
      <div class="dump-head"><span class="dump-head-lbl">✦ 지금 머릿속에 있는 것들</span></div>
      <textarea class="dump-ta" id="dump-ta" placeholder="한 줄에 하나씩, 형식 없이 쏟아내세요"></textarea>
      <div class="dump-foot">
        <span class="dump-hint">Cmd+Enter 덤프</span>
        <button class="btn btn-primary" onclick="dumpTasks()">쏟아내기 →</button>
      </div>
    </div>
    <div id="u-wrap" class="u-wrap" style="display:none">
      <div class="u-head"><span class="sec-label" style="margin:0">분류 대기</span><span id="u-cnt" style="font-size:11px;color:var(--ink3);font-weight:500"></span></div>
      <div class="u-list" id="u-list"></div>
    </div>
    <div class="sort-bar">
      <span class="sort-lbl">정렬</span>
      <button class="sort-btn on" id="sb-none" onclick="setSort('none')">기본</button>
      <button class="sort-btn" id="sb-start" onclick="setSort('start')">시작일</button>
      <button class="sort-btn" id="sb-due" onclick="setSort('due')">마감일</button>
    </div>
    <div id="g-today" class="group"><div class="group-head"><div class="group-dot" style="background:var(--pink)"></div><span class="group-name" style="color:var(--pink)">오늘</span><span class="group-count" id="gc-today"></span></div><div class="group-list" style="border:1.5px solid var(--pink-m)" id="gl-today" ondragover="gDO(event,'today')" ondrop="gDP(event,'today')" ondragleave="gDL(event)"></div></div>
    <div id="g-week"  class="group"><div class="group-head"><div class="group-dot" style="background:var(--green)"></div><span class="group-name" style="color:var(--green)">이번 주</span><span class="group-count" id="gc-week"></span></div><div class="group-list" style="border:1.5px solid var(--green-m)" id="gl-week" ondragover="gDO(event,'week')" ondrop="gDP(event,'week')" ondragleave="gDL(event)"></div></div>
    <div id="g-later" class="group"><div class="group-head"><div class="group-dot" style="background:var(--blue)"></div><span class="group-name" style="color:var(--blue)">나중에</span><span class="group-count" id="gc-later"></span></div><div class="group-list" style="border:1.5px solid var(--blue-m)" id="gl-later" ondragover="gDO(event,'later')" ondrop="gDP(event,'later')" ondragleave="gDL(event)"></div></div>
    <div id="g-custom"></div>
  </div>
  <!-- TIMELINE VIEW -->
  <div id="v-timeline" style="display:none">
    <p class="sec-label">타임라인</p>
    <div class="tl-wrap">
      <div class="tl-head">
        <button class="tl-nav" onclick="tlMove(-1)">‹</button>
        <span class="tl-title" id="tl-title"></span>
        <button class="tl-today-btn" onclick="tlToday()">오늘</button>
        <button class="tl-nav" onclick="tlMove(1)">›</button>
      </div>
      <div class="tl-grid">
        <div class="tl-days" id="tl-days"></div>
        <div class="tl-rows-wrap" id="tl-rows"></div>
      </div>
    </div>
  </div>
  <!-- MATRIX VIEW -->
  <div id="v-matrix" style="display:none">
    <p class="sec-label">세부 모아보기</p>
    <div class="mx-filter-bar" id="mx-filters"></div>
    <div class="mx-summary" id="mx-summary"></div>
    <div class="mx-board" id="mx-board"></div>
  </div>
  <!-- COPY VIEW -->
  <div id="v-copy" style="display:none">
    <p class="sec-label">내보내기</p>
    <div class="copy-box">
      <div class="copy-box-head">내보내기</div>
      <div class="copy-btns">
        <button class="copy-btn" onclick="copyAll('text')">📋 전체 텍스트</button>
        <button class="copy-btn" onclick="copyAll('md')">📝 마크다운</button>
        <button class="copy-btn" onclick="copyAll('notion')">🔲 Notion</button>
      </div>
    </div>
    <div class="copy-preview" id="copy-prev">여기에 미리보기가 표시됩니다</div>
  </div>
</main>
</div>

<!-- KANBAN MODAL -->
<div class="modal-overlay" id="kb-modal" onclick="if(event.target===this)closeKb()">
  <div class="modal-sheet">
    <div class="modal-drag-bar"></div>
    <div class="modal-head">
      <div class="modal-title" id="kb-modal-title"></div>
      <button class="modal-close" onclick="closeKb()">×</button>
    </div>
    <div class="modal-meta" id="kb-modal-meta"></div>
    <div class="modal-body">
      <div class="kb-board" id="kb-board"></div>
    </div>
  </div>
</div>

<!-- CAT MODAL -->
<div class="modal-overlay" id="cat-modal" onclick="if(event.target===this)closeCatModal()">
  <div class="cat-modal-sheet">
    <div class="cat-modal-head">
      <span style="font-size:14px;font-weight:700">카테고리 관리</span>
      <button class="modal-close" onclick="closeCatModal()">×</button>
    </div>
    <div class="cat-modal-body">
      <div id="cat-edit-list"></div>
      <button class="btn btn-ghost" style="width:100%;margin-top:11px;border-radius:8px" onclick="addCat()">+ 카테고리 추가</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-acts">
      <button class="btn btn-ghost" id="confirm-cancel">취소</button>
      <button class="btn btn-primary" id="confirm-ok" style="background:var(--red)">삭제</button>

<div class="tl-tooltip" id="tl-tip"></div>

<nav class="mobile-nav">

  <div class="mn" data-v="timeline" onclick="sw('timeline',this)"><span class="mn-icon">📅</span>타임라인</div>
  <div class="mn" data-v="matrix" onclick="sw('matrix',this)"><span class="mn-icon">☑️</span>세부</div>
  <div class="mn" onclick="openCatModal()"><span class="mn-icon">🏷</span>카테고리</div>
  <div class="mn" data-v="copy" onclick="sw('copy',this)"><span class="mn-icon">📤</span>내보내기</div>

<script>
// ══════ CONSTANTS ══════
const SWATCHES=['#E07FA0','#E07A5F','#F2C94C','#6BA888','#6D91C4','#9B72C4','#E07A7A','#4BBCB8','#A0876A','#D47AB5','#5BBFA0','#7A8A6E'];
const TIME={today:{n:'오늘',c:'var(--pink)',s:'var(--pink-s)',m:'var(--pink-m)'},week:{n:'이번 주',c:'var(--green)',s:'var(--green-s)',m:'var(--green-m)'},later:{n:'나중에',c:'var(--blue)',s:'var(--blue-s)',m:'var(--blue-m)'}};
const KB={todo:{n:'진행 전',c:'#9E9AA6',s:'#F4F3F6'},doing:{n:'진행 중',c:'#6D91C4',s:'#EEF3FB'},done:{n:'완료',c:'#6BA888',s:'#EDF6F1'}};
const KB_COLS=['todo','doing','done'];

// ══════ STATE ══════
let tasks=[],idc=0,userCats=[],catIdc=0;
let sortMode='none',tlWeek=null;
let dragId=null,kbDragInfo=null,mxDragInfo=null;
let mxCatFilter=null,mxViewMode='all';
let confirmCallback=null;

// ══════ STORAGE ══════
function save(){localStorage.setItem('md_t',JSON.stringify(tasks));localStorage.setItem('md_i',String(idc));localStorage.setItem('md_c',JSON.stringify(userCats));localStorage.setItem('md_ci',String(catIdc));}
function load(){
  try{
    const t=localStorage.getItem('md_t'),i=localStorage.getItem('md_i'),c=localStorage.getItem('md_c'),ci=localStorage.getItem('md_ci');
    if(t)tasks=JSON.parse(t);if(i)idc=parseInt(i);if(c)userCats=JSON.parse(c);if(ci)catIdc=parseInt(ci);
    tasks.forEach(t=>{
      if(!t.subtasks||Array.isArray(t.subtasks))t.subtasks={todo:[],doing:[],done:[]};
      if(!t.subtasks.todo)t.subtasks.todo=[];
      if(!t.subtasks.doing)t.subtasks.doing=[];
      if(!t.subtasks.done)t.subtasks.done=[];
      if(!t.color)t.color=null;
      if(!t.userCat)t.userCat=null;
      KB_COLS.forEach(col=>{(t.subtasks[col]||[]).forEach(s=>{if(s.memo===undefined)s.memo='';});});
    });
  }catch(e){}
}

// ══════ UTILS ══════
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const tds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr=()=>tds(new Date());
function dday(ds){if(!ds)return null;const d=new Date(ds+'T00:00:00');d.setHours(0,0,0,0);const n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);}
function ddayInfo(diff){
  if(diff===null)return null;
  if(diff<0)return{t:`D+${Math.abs(diff)}`,c:'dday-past'};
  if(diff===0)return{t:'D-Day',c:'dday-0'};
  if(diff<=3)return{t:`D-${diff}`,c:'dday-soon'};
  if(diff<=7)return{t:`D-${diff}`,c:'dday-ok'};
  return{t:`D-${diff}`,c:'dday-far'};
}
function drt(t){if(!t.startDate&&!t.dueDate)return null;if(t.startDate&&t.dueDate&&t.startDate!==t.dueDate)return`${t.startDate} ~ ${t.dueDate}`;return t.dueDate||t.startDate;}
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function softBg(col){if(col&&col.startsWith('#')){const[r,g,b]=hex2rgb(col);return`rgba(${r},${g},${b},.13)`;}return null;}
function taskColor(t){if(t.color)return t.color;if(t.userCat){const u=userCats.find(c=>c.id===t.userCat);if(u)return u.color;}return TIME[t.category]?.c||'var(--ink3)';}
function svgCheck(){return`<svg width="8" height="7" viewBox="0 0 8 7" fill="none"><path d="M1 3.5L3 5.5L7 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function allSubs(t){return[...(t.subtasks?.todo||[]),...(t.subtasks?.doing||[]),...(t.subtasks?.done||[])];}
function closeAllPop(){document.querySelectorAll('.popup.open,.kb-mv-pop.open,.kb-dp-pop.open,.mx-mini-pop.open,.mx-dp-pop.open').forEach(e=>e.classList.remove('open'));}

// ══════ DUMP ══════
function dumpTasks(){
  const raw=document.getElementById('dump-ta').value.trim();if(!raw)return;
  raw.split('\n').map(l=>l.trim()).filter(Boolean).forEach(text=>{
    tasks.push({id:++idc,text,category:null,done:false,color:null,userCat:null,startDate:null,dueDate:null,subtasks:{todo:[],doing:[],done:[]},subOpen:false});
  });
  document.getElementById('dump-ta').value='';save();renderAll();
}

// ══════ SORT ══════
function setSort(m){sortMode=m;['none','start','due'].forEach(k=>document.getElementById(`sb-${k}`).classList.toggle('on',k===m));renderAll();}
function sorted(arr){
  if(sortMode==='start')return[...arr].sort((a,b)=>(a.startDate||'9999')>(b.startDate||'9999')?1:-1);
  if(sortMode==='due')return[...arr].sort((a,b)=>(a.dueDate||'9999')>(b.dueDate||'9999')?1:-1);
  return arr;
}

// ══════ TASK OPS ══════
function setCat(id,cat){const t=tasks.find(x=>x.id===id);if(t){t.category=cat;save();renderAll();}}
function setUserCat(id,ucId){const t=tasks.find(x=>x.id===id);if(t){t.userCat=(t.userCat===ucId)?null:ucId;save();renderAll();}closeAllPop();}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();renderAll();}}
function editText(id,v){const t=tasks.find(x=>x.id===id);if(t&&v.trim()){t.text=v.trim();save();}}
function setColor(id,col){const t=tasks.find(x=>x.id===id);if(t){t.color=col||null;save();renderAll();}closeAllPop();}

  showConfirm(`"${t.text.length>26?t.text.slice(0,26)+'…':t.text}" 삭제할까요?`,()=>{tasks=tasks.filter(x=>x.id!==id);save();renderAll();});

function openDP(id){closeAllPop();document.getElementById(`dp-${id}`)?.classList.add('open');const t=tasks.find(x=>x.id===id);if(t){const cb=document.getElementById(`dp-cb-${id}`),si=document.getElementById(`dp-si-${id}`);if(cb&&si){cb.checked=!!t.startDate;si.disabled=!t.startDate;}}}
function toggleStartDate(id){const cb=document.getElementById(`dp-cb-${id}`),si=document.getElementById(`dp-si-${id}`);if(si)si.disabled=!cb.checked;if(!cb.checked&&si)si.value='';}
function setDP(id){const t=tasks.find(x=>x.id===id);if(!t)return;const cb=document.getElementById(`dp-cb-${id}`),si=document.getElementById(`dp-si-${id}`),di=document.getElementById(`dp-di-${id}`);t.startDate=(cb?.checked&&si?.value)?si.value:null;t.dueDate=di?.value||null;save();renderAll();closeAllPop();}
function clearDP(id){const t=tasks.find(x=>x.id===id);if(t){t.startDate=null;t.dueDate=null;save();renderAll();}closeAllPop();}

function openUCP(id){closeAllPop();document.getElementById(`ucp-${id}`)?.classList.add('open');}

// ══════ KANBAN OPS ══════

function closeKb(){document.getElementById('kb-modal').classList.remove('open');kbTaskId=null;}
function renderKbBoard(t){

    const k=KB[col];
    return`<div class="kb-col${''}" id="kbc-${t.id}-${col}"
      ondragover="kbDO(event,${t.id},'${col}')" ondragleave="kbDL(event,${t.id},'${col}')" ondrop="kbDP(event,${t.id},'${col}')">

function renderKbCard(t,s,col){
  const diff=dday(s.dueDate),dd=ddayInfo(diff);
  return`<div class="kb-card${s.done?' done':''}" id="kbc2-${t.id}-${s.id}" draggable="true"
    ondragstart="kbItemDS(event,${t.id},${s.id},'${col}')" ondragend="kbItemDE(event,${t.id},${s.id})">
    <div class="kb-card-top">
      <button class="kb-chk" onclick="kbToggle(${t.id},${s.id},'${col}')">${svgCheck()}</button>
      <div class="kb-card-txt" contenteditable="true"
        onblur="kbEdit(${t.id},${s.id},'${col}',this.textContent)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(s.text)}</div>
      <div class="kb-card-acts">
        <button class="t-act" onclick="kbOpenDP(${t.id},${s.id},'${col}')" title="날짜">📅</button>
        <button class="t-act" onclick="kbOpenMv(${t.id},${s.id},'${col}')" title="이동">↔</button>
        <button class="t-act del" onclick="kbDel(${t.id},${s.id},'${col}')">×</button>
      </div>
    </div>
    <textarea class="kb-memo" placeholder="메모..." onblur="kbEditMemo(${t.id},${s.id},'${col}',this.value)">${esc(s.memo||'')}</textarea>
    ${s.dueDate?`<div class="kb-card-meta"><span class="kb-card-date ${dd?dd.c:''}">${dd?dd.t+' · ':''}${s.dueDate}</span></div>`:''}
    <div class="kb-mv-pop" id="kbmv-${t.id}-${s.id}">
      <div class="kb-mv-title">이동</div>
      ${KB_COLS.filter(c=>c!==col).map(c=>`<button class="kb-mv-btn" onclick="kbMove(${t.id},${s.id},'${col}','${c}')"><span style="width:8px;height:8px;border-radius:50%;background:${KB[c].c};display:inline-block"></span>${KB[c].n}</button>`).join('')}
    </div>
    <div class="kb-dp-pop" id="kbdp-${t.id}-${s.id}">
      <input type="date" id="kbdpi-${t.id}-${s.id}" value="${s.dueDate||''}">
      <div class="kb-dp-acts">
        <button class="btn btn-ghost btn-sm" onclick="kbClearDP(${t.id},${s.id},'${col}')">삭제</button>

      </div>
    </div>

function kbToggle(tid,sid,col){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const s=t.subtasks[col]?.find(x=>x.id===sid);if(!s)return;
  const toCol=s.done?'todo':'done';
  s.done=!s.done;
  t.subtasks[col]=t.subtasks[col].filter(x=>x.id!==sid);
  t.subtasks[toCol].push(s);
  save();renderKbBoard(t);renderAll();
}
function kbEdit(tid,sid,col,v){const t=tasks.find(x=>x.id===tid);const s=t?.subtasks[col]?.find(x=>x.id===sid);if(s&&v.trim()){s.text=v.trim();save();}}
function kbEditMemo(tid,sid,col,v){const t=tasks.find(x=>x.id===tid);const s=t?.subtasks[col]?.find(x=>x.id===sid);if(s){s.memo=v;save();}}
function kbAdd(tid,col){
  const inp=document.getElementById(`kba-${tid}-${col}`);if(!inp?.value.trim())return;
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.subtasks[col].push({id:++idc,text:inp.value.trim(),done:col==='done',dueDate:null,memo:''});
  inp.value='';save();renderKbBoard(t);renderAll();
}
function kbDel(tid,sid,col){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.subtasks[col]=t.subtasks[col].filter(x=>x.id!==sid);
  save();renderKbBoard(t);renderAll();
}
function kbMove(tid,sid,fromCol,toCol){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const s=t.subtasks[fromCol]?.find(x=>x.id===sid);if(!s)return;
  t.subtasks[fromCol]=t.subtasks[fromCol].filter(x=>x.id!==sid);
  s.done=toCol==='done';t.subtasks[toCol].push(s);
  save();renderKbBoard(t);renderAll();closeAllPop();
}
function kbOpenMv(tid,sid,col){closeAllPop();document.getElementById(`kbmv-${tid}-${sid}`)?.classList.add('open');}
function kbOpenDP(tid,sid,col){closeAllPop();document.getElementById(`kbdp-${tid}-${sid}`)?.classList.add('open');}
function kbSetDP(tid,sid,col){
  const t=tasks.find(x=>x.id===tid);const s=t?.subtasks[col]?.find(x=>x.id===sid);
  if(s){const inp=document.getElementById(`kbdpi-${tid}-${sid}`);if(inp)s.dueDate=inp.value||null;save();renderKbBoard(t);}closeAllPop();
}
function kbClearDP(tid,sid,col){
  const t=tasks.find(x=>x.id===tid);const s=t?.subtasks[col]?.find(x=>x.id===sid);
  if(s){s.dueDate=null;save();renderKbBoard(t);}closeAllPop();
}
// kb drag
function kbItemDS(e,tid,sid,col){kbDragInfo={tid,sid,col};e.dataTransfer.effectAllowed='move';setTimeout(()=>document.getElementById(`kbc2-${tid}-${sid}`)?.classList.add('dragging'),0);}
function kbItemDE(e,tid,sid){kbDragInfo=null;document.getElementById(`kbc2-${tid}-${sid}`)?.classList.remove('dragging');document.querySelectorAll('.kb-col.kb-over').forEach(x=>x.classList.remove('kb-over'));}
function kbDO(e,tid,toCol){e.preventDefault();document.getElementById(`kbc-${tid}-${toCol}`)?.classList.add('kb-over');}
function kbDL(e,tid,toCol){document.getElementById(`kbc-${tid}-${toCol}`)?.classList.remove('kb-over');}
function kbDP(e,tid,toCol){
  e.preventDefault();document.querySelectorAll('.kb-col.kb-over').forEach(x=>x.classList.remove('kb-over'));
  if(!kbDragInfo||kbDragInfo.tid!==tid)return;
  const{sid,col}=kbDragInfo;if(col===toCol){kbDragInfo=null;return;}
  kbMove(tid,sid,col,toCol);kbDragInfo=null;
}

// ══════ MATRIX VIEW ══════
function renderMatrixView(){
  // filter
  let entries=[];
  tasks.filter(t=>t.category||t.userCat).forEach(t=>{
    KB_COLS.forEach(col=>{
      (t.subtasks[col]||[]).forEach(s=>{
        if(mxViewMode==='undone'&&s.done)return;
        if(mxViewMode==='done'&&!s.done)return;
        entries.push({t,col,s});
      });
    });
  });
  if(mxCatFilter)entries=entries.filter(e=>e.t.category===mxCatFilter||e.t.userCat===mxCatFilter);

  // filter bar
  const timeCats=[...new Set(entries.map(e=>e.t.category).filter(Boolean))];
  const ucIds=[...new Set(entries.map(e=>e.t.userCat).filter(Boolean))];
  document.getElementById('mx-filters').innerHTML=
    `<span class="sort-lbl">보기</span>
     <button class="sort-btn${mxViewMode==='all'?' on':''}" onclick="setMxView('all')">전체</button>
     <button class="sort-btn${mxViewMode==='undone'?' on':''}" onclick="setMxView('undone')">미완료</button>
     <button class="sort-btn${mxViewMode==='done'?' on':''}" onclick="setMxView('done')">완료</button>
     <span style="width:1px;background:var(--line);align-self:stretch;margin:0 2px"></span>`+
    timeCats.map(c=>`<span class="mx-filter-chip${mxCatFilter&&mxCatFilter!==c?' dim':''}" style="background:${TIME[c].s};color:${TIME[c].c};border-color:${TIME[c].m}" onclick="setMxFilter('${c}')">${TIME[c].n}</span>`).join('')+
    ucIds.map(id=>{const u=userCats.find(c=>c.id===id);if(!u)return'';return`<span class="mx-filter-chip${mxCatFilter&&mxCatFilter!==id?' dim':''}" style="background:${softBg(u.color)||'var(--line2)'};color:${u.color};border-color:${u.color}30" onclick="setMxFilter('${id}')">${esc(u.name)}</span>`;}).join('');

  const total=entries.length,done=entries.filter(e=>e.s.done).length;
  document.getElementById('mx-summary').textContent=`전체 ${total}개 · 완료 ${done}개 · 미완료 ${total-done}개`;
  document.getElementById('nb-m').textContent=total-done||0;

  if(!total){document.getElementById('mx-board').innerHTML=`<div class="mx-empty-state" style="grid-column:1/-1">세부 태스크가 없어요<br><span style="font-size:11px;margin-top:4px;display:block">할일 카드에서 칸반보드를 채워보세요</span></div>`;return;}

  // sort
  if(sortMode==='due')entries.sort((a,b)=>(a.s.dueDate||'9999')>(b.s.dueDate||'9999')?1:-1);

  const colEntries={todo:[],doing:[],done:[]};
  entries.forEach(e=>colEntries[e.col].push(e));
  KB_COLS.forEach(col=>{colEntries[col].sort((a,b)=>{if(!a.s.dueDate&&!b.s.dueDate)return 0;if(!a.s.dueDate)return 1;if(!b.s.dueDate)return -1;return a.s.dueDate>b.s.dueDate?1:-1;});});

  document.getElementById('mx-board').innerHTML=KB_COLS.map(col=>{
    const k=KB[col];
    return`<div class="mx-col${''}" id="mxc-${col}"
      ondragover="mxDO(event,'${col}')" ondragleave="mxDL(event,'${col}')" ondrop="mxDP(event,'${col}')">
      <div class="mx-col-head">
        <span class="mx-col-name" style="color:${k.c}">${k.n}</span>
        <span class="mx-col-cnt" style="background:${softBg(k.c)||k.s};color:${k.c}">${colEntries[col].length}</span>
      </div>
      <div class="mx-col-body">
        ${colEntries[col].map(({t,s})=>renderMxCard(t,s,col)).join('')}
        ${colEntries[col].length===0?`<div class="mx-empty-col">비어있어요</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setMxFilter(id){mxCatFilter=(mxCatFilter===id)?null:id;renderMatrixView();}

        <button class="btn btn-primary btn-sm" onclick="mxSetDP(${t.id},${s.id},'${col}')">설정</button>
      </div>
    </div>
  </div>`;

function mxItemDS(e,tid,sid,col){mxDragInfo={tid,sid,col};e.dataTransfer.effectAllowed='move';setTimeout(()=>document.getElementById(`mxcard-${tid}-${sid}`)?.classList.add('dragging'),0);}
function mxItemDE(e,tid,sid){mxDragInfo=null;document.getElementById(`mxcard-${tid}-${sid}`)?.classList.remove('dragging');document.querySelectorAll('.mx-col.over').forEach(x=>x.classList.remove('over'));}
function mxDO(e,toCol){e.preventDefault();document.getElementById(`mxc-${toCol}`)?.classList.add('over');}
function mxDL(e,toCol){document.getElementById(`mxc-${toCol}`)?.classList.remove('over');}
function mxDP(e,toCol){
  e.preventDefault();document.querySelectorAll('.mx-col.over').forEach(x=>x.classList.remove('over'));
  if(!mxDragInfo)return;
  const{tid,sid,col}=mxDragInfo;if(col===toCol){mxDragInfo=null;return;}
  mxMove(tid,sid,col,toCol);mxDragInfo=null;
}

// ══════ TIMELINE ══════
function getWeekStart(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(d.getFullYear(),d.getMonth(),diff);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function tlMove(d){tlWeek=addDays(tlWeek,d*7);renderTimeline();}
function tlToday(){tlWeek=getWeekStart(new Date());renderTimeline();}
function renderTimeline(){
  const days=[];for(let i=0;i<7;i++)days.push(addDays(tlWeek,i));
  const ts=todayStr();
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const m0=days[0],m6=days[6];
  document.getElementById('tl-title').textContent=m0.getMonth()===m6.getMonth()?`${m0.getFullYear()}년 ${months[m0.getMonth()]} ${m0.getDate()}–${m6.getDate()}일`:`${months[m0.getMonth()]} ${m0.getDate()}일 – ${months[m6.getMonth()]} ${m6.getDate()}일`;
  const DN=['월','화','수','목','금','토','일'];
  document.getElementById('tl-days').innerHTML=days.map((d,i)=>{
    const ds=tds(d),isTod=ds===ts,isWe=i>=5;
    return`<div class="tl-day${isTod?' today':''}${isWe?' weekend':''}"><div class="tl-day-name">${DN[i]}</div><div class="tl-day-num">${d.getDate()}</div></div>`;
  }).join('');
  const wS=tds(days[0]),wE=tds(days[6]);
  const vis=tasks.filter(t=>{if(!t.category&&!t.userCat)return false;const s=t.startDate||t.dueDate,e=t.dueDate||t.startDate;if(!s&&!e)return false;return(s<=wE)&&(e>=wS);});
  const rows=document.getElementById('tl-rows');
  rows.innerHTML='';
  // today line
  const ti=days.findIndex(d=>tds(d)===ts);
  if(ti>=0){const line=document.createElement('div');line.className='tl-today-line';line.style.left=`calc(${ti*100/7+50/7}%)`;rows.appendChild(line);}
  if(!vis.length){rows.innerHTML+='<div class="tl-empty">이번 주 기간이 설정된 할일이 없어요</div>';return;}
  // lane assignment
  const lanes=[];
  vis.forEach(t=>{
    const s=t.startDate||t.dueDate,e=t.dueDate||t.startDate;
    let cS=days.findIndex(d=>tds(d)>=s);if(cS<0)cS=0;
    let cE=days.findLastIndex(d=>tds(d)<=e);if(cE<0)cE=6;
    cS=Math.max(0,cS);cE=Math.min(6,cE);
    let lane=lanes.findIndex(end=>end<cS);if(lane<0)lane=lanes.length;
    lanes[lane]=cE;
    const clL=s<wS,clR=e>wE,single=!t.startDate||!t.dueDate||t.startDate===t.dueDate;
    const seg=single?'':clL&&clR?'bar-m':clL?'bar-e':clR?'bar-s':'';
    const col=taskColor(t);const isHex=col.startsWith('#');
    const bg=isHex?softBg(col)||'var(--bg)':({today:'var(--pink-s)',week:'var(--green-s)',later:'var(--blue-s)'})[t.category]||'var(--line2)';
    const ml=seg==='bar-e'||seg==='bar-m'?0:4,mr=seg==='bar-s'||seg==='bar-m'?0:4;
    const bar=document.createElement('div');
    bar.className=`tl-bar ${seg}`;
    const cw=100/7;
    bar.style.cssText=`left:calc(${cS*cw}% + ${ml}px);width:calc(${(cE-cS+1)*cw}% - ${ml+mr}px);top:${lane*28+8}px;background:${bg};color:${col};`;
    bar.textContent=clL?'':t.text;bar.title=t.text;
    bar.addEventListener('mouseenter',ev=>{
      const subs=allSubs(t),done=subs.filter(s=>s.done).length;
      const tip=document.getElementById('tl-tip');
      tip.textContent=`${t.text}${drt(t)?' · '+drt(t):''}${subs.length?' · 세부 '+done+'/'+subs.length:''}`;
      tip.classList.add('show');
    });
    bar.addEventListener('mousemove',ev=>{const tip=document.getElementById('tl-tip');tip.style.left=ev.clientX+14+'px';tip.style.top=ev.clientY-36+'px';});
    bar.addEventListener('mouseleave',()=>document.getElementById('tl-tip').classList.remove('show'));
    bar.addEventListener('click',ev=>{ev.stopPropagation();openKb(t.id);});
    rows.appendChild(bar);
  });
  rows.style.minHeight=`${(lanes.length||1)*28+16}px`;
}

// ══════ COPY ══════
function copyTask(id){const t=tasks.find(x=>x.id===id);if(!t)return;let out=t.text;const s=allSubs(t);if(s.length)out+='\n'+s.map(s=>`  - ${s.text}`).join('\n');navigator.clipboard.writeText(out).then(()=>toast('복사됐어요 ✓'));}
function copyAll(fmt){
  let out='';['today','week','later'].forEach(cat=>{
    const items=tasks.filter(t=>t.category===cat);if(!items.length)return;
    if(fmt==='text'){out+=`【${TIME[cat].n}】\n`;items.forEach(t=>{out+=`${t.done?'✓':'○'} ${t.text}\n`;});out+='\n';}
    else if(fmt==='md'){out+=`## ${TIME[cat].n}\n`;items.forEach(t=>{out+=`- [${t.done?'x':' '}] ${t.text}\n`;});out+='\n';}
    else{out+=`# ${TIME[cat].n}\n`;items.forEach(t=>{out+=`☐ ${t.text}\n`;});out+='\n';}
  });
  const final=out.trim();navigator.clipboard.writeText(final).then(()=>toast('복사됐어요 ✓'));
  document.getElementById('copy-prev').textContent=final||'(내용 없음)';
}

// ══════ CATEGORIES ══════
function addCat(){
  const cols=['#9B72C4','#4BBCB8','#F2A74B','#E87A7A','#5BBFA0','#D47AB5'];
  userCats.push({id:`uc${++catIdc}`,name:'새 카테고리',color:cols[userCats.length%cols.length]});
  save();renderCatNav();renderCatEditList();
}
function delCat(id){userCats=userCats.filter(c=>c.id!==id);tasks.forEach(t=>{if(t.userCat===id)t.userCat=null;});save();renderCatNav();renderCatEditList();renderAll();}
function updateCat(id,f,v){const c=userCats.find(x=>x.id===id);if(c){c[f]=v;save();renderCatNav();if(f==='color')renderAll();}}
let activeCatFilter=null;
function renderCatNav(){
  document.getElementById('cat-nav-list').innerHTML=userCats.map(c=>`
    <div class="cat-item${activeCatFilter===c.id?' cat-item-active':''}" onclick="setCatFilter('${c.id}')" style="cursor:pointer;${activeCatFilter===c.id?`border-left:2.5px solid ${c.color};background:${softBg(c.color)||'var(--line2)'}`:''};transition:all .12s">
      <span style="width:7px;height:7px;border-radius:50%;background:${c.color};flex-shrink:0"></span>
      <span style="flex:1;font-size:12px;font-weight:500;color:var(--ink2)">${esc(c.name)}</span>
      <span style="font-size:10px;font-weight:700;background:${activeCatFilter===c.id?c.color:'var(--line)'};padding:1px 7px;border-radius:20px;color:${activeCatFilter===c.id?'#fff':'var(--ink2)'}">
        ${tasks.filter(t=>t.userCat===c.id).length}
      </span>
    </div>`).join('')||'<div style="padding:4px 18px;font-size:11px;color:var(--ink3)">없음 — + 관리에서 추가</div>';
}
function setCatFilter(id){
  activeCatFilter=(activeCatFilter===id)?null:id;
  // switch to dump view and show filtered
  sw('dump',document.querySelector('[data-v="dump"]'));
  renderAll();
  renderCatNav();
}
function openCatModal(){document.getElementById('cat-modal').classList.add('open');renderCatEditList();}
function closeCatModal(){document.getElementById('cat-modal').classList.remove('open');renderAll();}
function renderCatEditList(){
  document.getElementById('cat-edit-list').innerHTML=userCats.length?userCats.map(c=>`
    <div class="cat-row">
      <input type="color" class="cat-color-inp" value="${c.color}" onchange="updateCat('${c.id}','color',this.value)">
      <input type="text" class="cat-name-inp" value="${esc(c.name)}" onblur="updateCat('${c.id}','name',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      <button class="cat-del-btn" onclick="delCat('${c.id}')">×</button>
    </div>`).join(''):'<p style="font-size:13px;color:var(--ink3);text-align:center;padding:18px 0">카테고리가 없어요</p>';
}

// ══════ TASK DRAG ══════
function makeDraggable(id){const el=document.getElementById(`ti-${id}`);if(!el)return;el.setAttribute('draggable','true');el.ondragstart=e=>taskDS(e,id);el.ondragend=e=>taskDE(e,id);}
function taskDS(e,id){dragId=id;e.dataTransfer.effectAllowed='move';}
function taskDE(e,id){dragId=null;const el=document.getElementById(`ti-${id}`);if(el){el.removeAttribute('draggable');el.ondragstart=null;el.ondragend=null;}document.querySelectorAll('.group-list.over').forEach(x=>x.classList.remove('over'));}
function gDO(e,cat){e.preventDefault();document.getElementById(`gl-${cat}`)?.classList.add('over');}
function gDL(e){e.currentTarget.classList.remove('over');}
function gDP(e,cat){e.preventDefault();document.querySelectorAll('.group-list.over').forEach(x=>x.classList.remove('over'));if(dragId===null)return;const t=tasks.find(x=>x.id===dragId);if(t){t.category=cat;save();renderAll();}}

// ══════ CONFIRM ══════
function showConfirm(msg,cb){
  confirmCallback=cb;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm').classList.add('open');
}
document.getElementById('confirm-cancel').onclick=()=>{document.getElementById('confirm').classList.remove('open');confirmCallback=null;};
document.getElementById('confirm-ok').onclick=()=>{document.getElementById('confirm').classList.remove('open');if(confirmCallback)confirmCallback();confirmCallback=null;};

// ══════ RENDER ITEM ══════
function renderItem(t){
  if(!t.subtasks||Array.isArray(t.subtasks))t.subtasks={todo:[],doing:[],done:[]};
  const col=taskColor(t);
  const dr=drt(t),diff=dday(t.dueDate),dd=ddayInfo(diff);
  const subs=allSubs(t),subDone=subs.filter(s=>s.done).length;
  const u=t.userCat?userCats.find(c=>c.id===t.userCat):null;
  const timeCols={today:'var(--pink)',week:'var(--green)',later:'var(--blue)'};
  const timeBgs={today:'var(--pink-s)',week:'var(--green-s)',later:'var(--blue-s)'};

  return`<div class="t-item${t.done?' done':''}" id="ti-${t.id}">
  <div class="t-stripe" style="background:${col};opacity:.7"></div>
  <div class="t-main">
    <span class="t-drag" onmousedown="makeDraggable(${t.id})" ontouchstart="makeDraggable(${t.id})">⠿</span>
    <button class="t-chk" onclick="toggleDone(${t.id})" style="border-color:${t.done?'transparent':col};${t.done?`background:${col};`:''}">
      ${svgCheck()}
    </button>
    <div class="t-body">
      <div class="t-text" contenteditable="true" onblur="editText(${t.id},this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(t.text)}</div>
      <div class="t-meta">
        <button class="t-date-pill" onclick="openDP(${t.id})">📅${dr?`<span class="t-date-val">${dr}</span>`:''}
        </button>
        ${dd?`<span class="t-dday ${dd.c}">${dd.t}</span>`:''}
        ${u?`<span class="t-cat-tag" style="background:${softBg(u.color)||'var(--line2)'};color:${u.color}" onclick="openUCP(${t.id})">${esc(u.name)}</span>`
           :(userCats.length?`<span class="t-cat-tag" style="background:var(--line2);color:var(--ink3)" onclick="openUCP(${t.id})">+ 카테고리</span>`:'')}
        <button class="t-kb-btn" onclick="openKb(${t.id})">⠿ ${subs.length?`${subDone}/${subs.length}`:'칸반'}</button>
        <button class="t-copy-btn" onclick="copyTask(${t.id})">복사</button>
        <div class="t-move-btns">
          ${t.category!=='today'?`<button class="t-move-btn" style="color:${timeCols.today};border-color:${timeCols.today}" onclick="setCat(${t.id},'today')">오늘</button>`:''}
          ${t.category!=='week'?`<button class="t-move-btn" style="color:${timeCols.week};border-color:${timeCols.week}" onclick="setCat(${t.id},'week')">이번 주</button>`:''}
          ${t.category!=='later'?`<button class="t-move-btn" style="color:${timeCols.later};border-color:${timeCols.later}" onclick="setCat(${t.id},'later')">나중에</button>`:''}
        </div>
      </div>
    </div>
    <div class="t-acts">
      <button class="t-color-dot" style="background:${col}" onclick="openCP(${t.id})"></button>
      <button class="t-act del" onclick="removeTask(${t.id})">🗑</button>
    </div>
  </div>
  <!-- color popup -->
  <div class="popup cp-box" id="cp-${t.id}">
    <div class="cp-title">색상</div>
    <div class="cp-swatches">
      <div class="swatch${!t.color?' active':''}" style="background:var(--line);font-size:11px;color:var(--ink3)" onclick="setColor(${t.id},null)">✕</div>
      ${SWATCHES.map(c=>`<div class="swatch${t.color===c?' active':''}" style="background:${c}" onclick="setColor(${t.id},'${c}')"></div>`).join('')}
    </div>
    <div class="cp-custom"><span>직접</span><input type="color" value="${t.color||'#E07FA0'}" onchange="setColor(${t.id},this.value)"></div>
  </div>
  <!-- date popup -->
  <div class="popup dp-box" id="dp-${t.id}">
    <div class="dp-row">
      <div class="dp-lbl"><input type="checkbox" id="dp-cb-${t.id}" ${t.startDate?'checked':''} onchange="toggleStartDate(${t.id})">시작일</div>
      <input type="date" class="dp-input" id="dp-si-${t.id}" value="${t.startDate||''}" ${t.startDate?'':'disabled'}>
    </div>
    <div class="dp-row">
      <div class="dp-lbl">마감일</div>
      <input type="date" class="dp-input" id="dp-di-${t.id}" value="${t.dueDate||''}">
    </div>
    <div class="dp-acts">
      <button class="btn btn-ghost btn-sm" onclick="clearDP(${t.id})">삭제</button>
      <button class="btn btn-primary btn-sm" onclick="setDP(${t.id})">설정</button>
    </div>
  </div>
  <!-- cat picker -->
  <div class="popup cat-pick-box" id="ucp-${t.id}">
    ${userCats.length?`
      ${userCats.map(c=>`<div class="cat-pick-row${t.userCat===c.id?' active':''}" onclick="setUserCat(${t.id},'${c.id}')"><span style="width:8px;height:8px;border-radius:50%;background:${c.color};flex-shrink:0"></span>${esc(c.name)}${t.userCat===c.id?' ✓':''}</div>`).join('')}
      ${t.userCat?`<div class="cat-pick-clear" onclick="setUserCat(${t.id},null)">× 해제</div>`:''}`
    :`<div class="cat-pick-empty">카테고리를 먼저 만들어주세요</div>`}
  </div>
</div>`;
}

// ══════ RENDER ALL ══════
function renderAll(){
  const uns=tasks.filter(t=>!t.category);
  const tt=sorted(tasks.filter(t=>t.category==='today'));
  const tw=sorted(tasks.filter(t=>t.category==='week'));
  const tl=sorted(tasks.filter(t=>t.category==='later'));

  // unsorted
  document.getElementById('u-wrap').style.display=uns.length?'block':'none';
  document.getElementById('u-cnt').textContent=uns.length+'개';
  document.getElementById('u-list').innerHTML=uns.map(t=>`
    <div class="u-row">
      <div class="u-txt" contenteditable="true" onblur="editText(${t.id},this.textContent)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(t.text)}</div>
      <div class="u-cat-btns">
        <button class="u-cat-btn" style="color:var(--pink);border-color:var(--pink-m)" onclick="setCat(${t.id},'today')">오늘</button>
        <button class="u-cat-btn" style="color:var(--green);border-color:var(--green-m)" onclick="setCat(${t.id},'week')">이번 주</button>
        <button class="u-cat-btn" style="color:var(--blue);border-color:var(--blue-m)" onclick="setCat(${t.id},'later')">나중에</button>
      </div>
    </div>`).join('');

  // groups - time based, optionally filtered by category
  [{cat:'today',items:tt},{cat:'week',items:tw},{cat:'later',items:tl}].forEach(({cat,items})=>{
    const filtered=activeCatFilter?items.filter(t=>t.userCat===activeCatFilter):items;
    const g=document.getElementById(`g-${cat}`);
    if(filtered.length)g.classList.add('show');else g.classList.remove('show');
    document.getElementById(`gl-${cat}`).innerHTML=filtered.map(t=>renderItem(t)).join('');
    document.getElementById(`gc-${cat}`).textContent=(activeCatFilter?filtered.length+'/'+items.length:items.length)+'개';
  });
  document.getElementById('g-custom').innerHTML='';

  // badges
  document.getElementById('nb-u').textContent=uns.length;
  document.getElementById('nb-t').textContent=tt.length;
  document.getElementById('nb-w').textContent=tw.length;
  document.getElementById('nb-l').textContent=tl.length;
  renderCatNav();

  // progress
  const all=tasks.filter(t=>t.category||t.userCat);
  const done=all.filter(t=>t.done).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  // mx badge
  const mxTotal=tasks.flatMap(t=>[...(t.subtasks?.todo||[]),...(t.subtasks?.doing||[])]).length;
  document.getElementById('nb-m').textContent=mxTotal||0;

  if(document.getElementById('v-timeline').style.display!=='none')renderTimeline();
  if(document.getElementById('v-matrix').style.display!=='none')renderMatrixView();
}

function gDPUC(e,ucId){e.preventDefault();document.querySelectorAll('.group-list.over').forEach(x=>x.classList.remove('over'));if(dragId===null)return;const t=tasks.find(x=>x.id===dragId);if(t){t.userCat=ucId;save();renderAll();}}

// ══════ VIEW SWITCH ══════
function sw(v,el){
  document.querySelectorAll('.ni,.mn').forEach(x=>{if(x.dataset.v===v)x.classList.add('active');else x.classList.remove('active');});
  ['dump','timeline','matrix','copy'].forEach(id=>{const e=document.getElementById(`v-${id}`);if(e)e.style.display=id===v?'block':'none';});
  if(['today','week','later'].includes(v)){sw('dump',document.querySelector('[data-v="dump"]'));setTimeout(()=>document.getElementById(`g-${v}`)?.scrollIntoView({behavior:'smooth'}),60);return;}
  if(v==='timeline')renderTimeline();
  if(v==='matrix')renderMatrixView();
  if(el)el.classList.add('active');
}

// ══════ TOAST ══════
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2300);}

// ══════ INIT ══════
document.getElementById('dump-ta').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')dumpTasks();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeKb();closeCatModal();closeAllPop();}});
document.addEventListener('click',e=>{
  if(!e.target.closest('.popup')&&!e.target.closest('.t-color-dot')&&!e.target.closest('.t-date-pill')&&
     !e.target.closest('.t-cat-tag')&&!e.target.closest('[onclick*="openUCP"]')&&
     !e.target.closest('.kb-mv-pop')&&!e.target.closest('.kb-dp-pop')&&
     !e.target.closest('.mx-mini-pop')&&!e.target.closest('.mx-dp-pop')&&
     !e.target.closest('.mx-cal-btn')&&!e.target.closest('.mx-mv-btn')&&
     !e.target.closest('[onclick*="kbOpenMv"]')&&!e.target.closest('[onclick*="kbOpenDP"]'))
    closeAllPop();
});
tlWeek=getWeekStart(new Date());
load();renderAll();
// auto-resize memo textareas
document.addEventListener('input',e=>{
  if(e.target.classList.contains('kb-memo')){
    e.target.style.height='0';
    e.target.style.height=e.target.scrollHeight+'px';
  }
});
// init heights after render
function initMemoHeights(){
  document.querySelectorAll('.kb-memo').forEach(el=>{el.style.height='0';el.style.height=el.scrollHeight+'px';});
}
